        var _mediaList = {
            image: [],
            audio: [],
            video: []
        };

        // منع الصفر في بداية رقم الصفحة
        $("#txt_num").keypress(function (e) {
            if (
                this.value.length === 0 &&
                e.which === 48
            ) {
                return false;
            }

            if (
                e.which !== 8 &&
                e.which !== 0 &&
                (
                    e.which < 48 ||
                    e.which > 57
                )
            ) {
                return false;
            }
        });
    </script>
