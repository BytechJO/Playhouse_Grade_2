<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta
      http-equiv="X-UA-Compatible"
      content="ie=edge"
    />

    <title>Playhouse</title>

    <!-- =====================================================
         Main CSS
         ===================================================== -->

    <link
      rel="stylesheet"
      href="../css/jquery-ui.min.css"
    />

    <link
      rel="stylesheet"
      href="../css/bootstrap/bootstrap.css"
    />

    <style id="ui_style"></style>

    <link
      rel="stylesheet"
      href="../css/draw.css"
    />

    <link
      rel="stylesheet"
      href="../css/all.min.css"
    />

    <link
      rel="stylesheet"
      href="../css/styles.css"
    />

    <link
      rel="stylesheet"
      href="../css/unit_styles.css"
    />

    <link
      rel="stylesheet"
      href="../css/activities.css"
    />

    <link
      rel="stylesheet"
      href="../css/audio.css"
    />

    <!-- =====================================================
         Read, Write and Colour CSS
         ===================================================== -->

    <link
      rel="stylesheet"
      href="../css/read_colour.css"
    />

    <!-- =====================================================
         Libraries
         ===================================================== -->

    <script
      src="../js/jquery-3.4.1.min.js"
      type="text/javascript"
    ></script>

    <script
      src="../js/jquery-ui.min.js"
      type="text/javascript"
    ></script>

    <script
      src="../js/bootstrap/bootstrap.bundle.min.js"
      type="text/javascript"
    ></script>

    <script
      src="../js/jquery.ui.touch-punch.min.js"
      type="text/javascript"
    ></script>

    <!-- =====================================================
         Template Data
         ===================================================== -->

    <script
      src="../js/data/templateData.js"
      type="text/javascript"
    ></script>

    <!-- =====================================================
         Activity List
         ===================================================== -->

    <script
      src="../js/data/activityList.js"
      type="text/javascript"
    ></script>

    <!-- =====================================================
         Read, Write and Colour Data
         ===================================================== -->

    <script
      src="../js/data/read_colour_data.js"
      type="text/javascript"
    ></script>

    <!-- =====================================================
         JSON Render
         ===================================================== -->

    <script
      src="../js/build/jsonRender.js"
      type="text/javascript"
    ></script>
  </head>

  <body>
    <!-- =====================================================
         Side Masks
         ===================================================== -->

    <div class="mask_parent">
      <div class="mask_left"></div>
      <div class="mask_right"></div>
    </div>

    <!-- =====================================================
         Loading
         ===================================================== -->

    <div class="loading">
      <div class="loader"></div>
    </div>

    <!-- =====================================================
         Header
         ===================================================== -->

    <header class="fixed-top"></header>

    <!-- =====================================================
         Main Content
         ===================================================== -->

    <div class="mainContent">
      <!-- ===================================================
           Feedback Popup
           =================================================== -->

      <div
        id="feedbackPopup"
        class="modal fade"
        role="dialog"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div>
              <button
                type="button"
                class="close closeFeedback"
                data-dismiss="modal"
              >
                &times;
              </button>
            </div>

            <div class="modal-body">
              <video
                id="video_1"
                src="../videos/goodjob.mp4"
                preload
              ></video>

              <video
                id="video_2"
                src="../videos/tryagain.mp4"
                preload
              ></video>
            </div>
          </div>
        </div>
      </div>

      <!-- ===================================================
           Activity Container
           =================================================== -->

      <div class="container content_wrap activity_wrap">
        <!-- Screen Numbers -->

        <div
          class="fixed-top screen_numbers_wrap"
          style="z-index: 2"
        ></div>

        <!-- =================================================
             Activity Information
             ================================================= -->

        <div
          class="activity_buts d-none"
          data-buttons="ccss,link,tips,homework"
        >
          <div
            class="ccss_content"
            data-height=""
          >
            L.2.1
          </div>

          <div
            class="link_content"
            data-height=""
          ></div>

          <div
            class="tips_content"
            data-height=""
          >
            <span class="pop_title">
              Read, Write and Colour
            </span>

            <br />

            <span>
              Write in the four boxes and colour the picture.
            </span>
          </div>

          <div
            class="homework_content"
            data-height=""
          >
            Have your child write in the four boxes and colour
            the shopping picture.
          </div>
        </div>

        <!-- =================================================
             Activity Area
             ================================================= -->

        <div
          class="activity_container activity_area read_colour mx-auto"
          data-activity="read_colour"
          data-type="read_colour"
        ></div>
      </div>
    </div>

    <!-- =====================================================
         Activity Control Panel
         ===================================================== -->

    <div
      class="modal fade activityCtrlPanel"
      tabindex="-1"
      role="dialog"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <div class="ctrlIcon"></div>

            <h4 class="modal-title"></h4>

            <button
              type="button"
              class="close"
              data-dismiss="modal"
            >
              &times;
            </button>
          </div>

          <div class="modal-body"></div>
        </div>
      </div>
    </div>

    <!-- =====================================================
         Sub Footer
         ===================================================== -->

    <div class="sub_footer">
      <div class="container sub_footer_buttons_wrap"></div>
    </div>

    <!-- =====================================================
         Footer
         ===================================================== -->

    <footer class="fixed-bottom"></footer>

    <!-- =====================================================
         Media List
         ===================================================== -->

    <script>
      var _mediaList = {
        image: [],
        audio: [],
        video: [],
      };
    </script>

    <!-- =====================================================
         Main Scripts
         ===================================================== -->

    <script
      src="../js/build/toolbar.js"
      type="text/javascript"
    ></script>

    <script
      src="../js/build/template.js"
      type="text/javascript"
    ></script>

    <!-- Read, Write and Colour Builder -->

    <script
      src="../js/build/read_colour_build.js"
      type="text/javascript"
    ></script>

    <!-- Audio -->

    <script
      src="../js/audioControls.js"
      type="text/javascript"
    ></script>

    <script
      src="../js/build/audio.js"
      type="text/javascript"
    ></script>

    <script
      src="../js/build/radio_build.js"
      type="text/javascript"
    ></script>

    <!-- General Build and Loading -->

    <script
      src="../js/generalfunctions.js"
      type="text/javascript"
    ></script>

    <!-- Read, Write and Colour Activity Class -->

    <script
      src="../js/activity/read_colour.js"
      type="text/javascript"
    ></script>

    <!-- Shared Activities Controller -->

    <script
      src="../js/activities.js"
      type="text/javascript"
    ></script>

    <!-- Loading -->

    <script
      src="../js/loading.js"
      type="text/javascript"
    ></script>

    <!-- Sketchpad -->

    <script
      src="../js/sketchpad.js"
      type="text/javascript"
    ></script>
  </body>
</html>
